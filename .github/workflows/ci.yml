name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest tests/unit

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Telegram adapter dependencies
        run: npm install --prefix adapters/telegram-bot --package-lock=false

      - name: Telegram adapter lint
        run: npm --prefix adapters/telegram-bot run lint

      - name: Telegram adapter type check
        run: npm --prefix adapters/telegram-bot run typecheck

      - name: Telegram adapter tests
        run: npm --prefix adapters/telegram-bot test

      - name: Start local services
        run: docker compose -f infra/docker-compose.yml up -d --wait

      - name: Migrate database
        run: uv run alembic upgrade head

      - name: Integration tests
        run: AGENT_SUPPORT_RUN_INTEGRATION=1 uv run pytest tests/integration

      - name: Secret scan
        run: uv run python scripts/check_secret_scan.py
